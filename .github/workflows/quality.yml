name: 품질 검사

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 의존성 설치
        run: python -m pip install -r scripts/requirements.txt

      - name: 공개 저장소 품질 검사
        run: python scripts/check_quality.py

      - name: 사주 모듈 회귀 테스트
        run: python tests/test_saju_regression.py
